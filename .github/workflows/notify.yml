name: Push Notification — envoi manuel

# L'envoi automatique à la publication est désactivé : les notifications
# partent aux créneaux programmés (scheduled-notify.yml, mardi & vendredi
# 10h Paris). Ce workflow reste l'outil d'envoi MANUEL à la demande.

on:
  workflow_dispatch:             # déclenchement manuel — envoyer/renvoyer une notif
    inputs:
      issue:
        description: "Numéro d'issue (ex: 09) — laisser vide pour auto-détecter le dernier commit"
        required: false
        default: ''

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 10   # laisse le temps au warm-up Render (cold start) + retries de /notify
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect new issue
        id: detect
        run: |
          # Déclenchement manuel avec un numéro explicite : priorité.
          MANUAL="${{ github.event.inputs.issue }}"
          if [ -n "$MANUAL" ]; then
            echo "issue=$MANUAL" >> $GITHUB_OUTPUT
            echo "Manual issue: $MANUAL"
            exit 0
          fi
          # Garde [skip notify] : si le commit de tête porte ce tag, on sort
          # sans notifier. Sert à re-render des issues existantes (ex: refonte
          # du template) sans envoyer de fausse notif aux abonnés.
          MSG=$(git log -1 --pretty=%B HEAD)
          if echo "$MSG" | grep -qF '[skip notify]'; then
            echo "no_issue=true" >> $GITHUB_OUTPUT
            echo "Commit marqué [skip notify] — pas de notification envoyée."
            exit 0
          fi
          # Sinon : ne considère que les fichiers d'issue AJOUTÉS (--diff-filter=A).
          # Un re-render de masse des issues existantes (changement de template)
          # ne modifie que des fichiers déjà présents → aucune notification.
          CHANGED=$(git diff --name-only --diff-filter=A HEAD~1 HEAD | grep '^issues/.*/index\.html$' | head -1)
          if [ -z "$CHANGED" ]; then
            echo "no_issue=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          # Extrait le numéro d'issue ex: issues/09/index.html → 09
          ISSUE=$(echo "$CHANGED" | cut -d'/' -f2)
          echo "issue=$ISSUE" >> $GITHUB_OUTPUT
          echo "Detected issue: $ISSUE"

      - name: Set up Python
        if: steps.detect.outputs.no_issue != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        if: steps.detect.outputs.no_issue != 'true'
        run: pip install requests python-dotenv

      - name: Send push notification
        if: steps.detect.outputs.no_issue != 'true'
        env:
          RENDER_URL:  ${{ secrets.RENDER_URL }}
          PUSH_SECRET: ${{ secrets.PUSH_SECRET }}
        run: |
          ISSUE="${{ steps.detect.outputs.issue }}"
          python tools/send_push.py \
            --issue "$ISSUE" \
            --title "KAPMAN SIGNAL N°$ISSUE" \
            --body "Nouvelle issue disponible — écoute ce qu'on a sélectionné ce mois-ci."
