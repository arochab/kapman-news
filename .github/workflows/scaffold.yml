name: Scaffold next issue

on:
  schedule:
    # Rythme de parution bi-hebdo : le squelette du numéro suivant est prêt
    # ~45 min après chaque créneau d'envoi (mardi & vendredi 10h Paris).
    # Idempotent (vérifie l'existence du JSON), donc pas de garde DST.
    - cron: '45 8 * * 2,5'
  workflow_dispatch: {}     # déclenchement manuel pour tester

jobs:
  scaffold:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Determine next issue number
        id: next
        run: |
          MAX=$(ls issues/ | grep -E '^[0-9]+$' | sort -n | tail -1 | sed 's/^0*//')
          NEXT=$((MAX + 1))
          PADDED=$(printf '%02d' $NEXT)
          echo "num=$PADDED" >> $GITHUB_OUTPUT
          echo "Next issue: $PADDED"

      - name: Check if scaffold already exists
        id: check
        run: |
          if [ -f "content/${{ steps.next.outputs.num }}.json" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "content/${{ steps.next.outputs.num }}.json already exists — nothing to do."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Python
        if: steps.check.outputs.exists == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create scaffold
        if: steps.check.outputs.exists == 'false'
        run: python tools/new_issue.py --num ${{ steps.next.outputs.num }}

      - name: Commit and push
        if: steps.check.outputs.exists == 'false'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/${{ steps.next.outputs.num }}.json
          # Message multiligne via -F - + heredoc quoté (un -m multiligne
          # cassait l'indentation YAML ; le heredoc quoté neutralise les
          # backticks, et les expressions du workflow sont substituées par le
          # runner avant le shell. NB : jamais d'accolades doubles vides dans
          # ce fichier, le parseur GitHub rejette alors TOUT le workflow.
          git commit -F - <<'MSG'
          chore: scaffold CIRCUIT FERMÉ N°${{ steps.next.outputs.num }} (à remplir en session)

          Rappel éditorial avant d'écrire le contenu :
          - AUCUNE répétition : jamais une track/artiste/label déjà utilisé.
          - LIENS RÉELS uniquement : YouTube/Bandcamp des playlists réelles d'Adam.
          - Accents cyclent rouge → vert → bleu ; stats alternent vert/bleu.
          - Ton : euphorique, physique, précis. La marque publique est CIRCUIT FERMÉ, jamais KAPMAN ni Escape dans les textes.

          Pour publier : remplir content/${{ steps.next.outputs.num }}.json puis
          `python tools/new_issue.py --num ${{ steps.next.outputs.num }} --build` + push.
          La notification partira au prochain créneau (mardi/vendredi 10h Paris).
          MSG
          git push origin master
