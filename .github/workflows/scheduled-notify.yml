name: Publication programmée · mardi & vendredi 10h (Paris)

# Pipeline de publication : à chaque créneau, prend LE PLUS PETIT numéro dont
# le content/NN.json est REMPLI (tagline non vide) et non encore notifié
# (marqueur state/last-notified-issue.txt), le rend si besoin (build committé),
# puis envoie la notification et avance le marqueur. Un numéro par créneau,
# dans l'ordre : la file s'écoule à 2 numéros/semaine sans rien sauter.
# Un squelette vide ne part jamais : le créneau reste silencieux.
#
# GitHub cron = UTC uniquement : deux crons (été UTC+2 / hiver UTC+1) + une
# garde qui vérifie qu'il est 10h à Paris ; le doublon DST sort silencieusement.

on:
  schedule:
    - cron: '0 8 * * 2,5'   # 10h Paris en heure d'été (UTC+2)
    - cron: '0 9 * * 2,5'   # 10h Paris en heure d'hiver (UTC+1)
  workflow_dispatch: {}      # test manuel : ignore la garde horaire

concurrency:
  group: scheduled-notify
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 12   # warm-up Render (cold start) + retries de /notify

    steps:
      - name: Garde horaire (10h à Paris)
        id: gate
        run: |
          # Tolérant aux retards de cron GitHub (souvent 1 à 3h aux heures
          # chargées : le créneau du 3 juillet est parti à 12h34 Paris et la
          # garde stricte "H == 10" l'a avalé). On accepte 10h à 14h ; le
          # doublon été/hiver reste inoffensif : le fichier d'état rend le
          # second passage silencieux.
          H=$(TZ=Europe/Paris date +%H)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || { [ "$H" -ge 10 ] && [ "$H" -le 14 ]; }; then
            echo "go=true" >> $GITHUB_OUTPUT
          else
            echo "go=false" >> $GITHUB_OUTPUT
            echo "Il est ${H}h à Paris, hors fenêtre de livraison : on sort."
          fi

      - uses: actions/checkout@v4
        if: steps.gate.outputs.go == 'true'

      - name: Set up Python
        if: steps.gate.outputs.go == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: File d'attente · prochain numéro rempli non notifié
        id: queue
        if: steps.gate.outputs.go == 'true'
        run: |
          LAST=$(cat state/last-notified-issue.txt 2>/dev/null || echo "00")
          NEXT=""
          for J in $(ls content/ | grep -E '^[0-9]{2}\.json$' | sort); do
            NN="${J%.json}"
            if [ "$((10#$NN))" -le "$((10#$LAST))" ]; then continue; fi
            FILLED=$(python3 -c "import json;d=json.load(open('content/$J'));print('yes' if d.get('tagline_plain','').strip() else 'no')")
            if [ "$FILLED" = "yes" ]; then NEXT="$NN"; break; fi
          done
          echo "issue=$NEXT" >> $GITHUB_OUTPUT
          if [ -n "$NEXT" ]; then
            if [ -s "issues/$NEXT/index.html" ]; then
              echo "needs_build=false" >> $GITHUB_OUTPUT
            else
              echo "needs_build=true" >> $GITHUB_OUTPUT
            fi
            echo "→ File : N°$NEXT (dernier notifié : $LAST)"
          else
            echo "needs_build=false" >> $GITHUB_OUTPUT
            echo "→ Aucun numéro rempli en attente (dernier notifié : $LAST). Créneau silencieux."
          fi

      - name: Install deps
        if: steps.queue.outputs.issue != ''
        run: pip install requests python-dotenv jinja2 pillow

      - name: Rendre et publier le numéro (si pas encore rendu)
        if: steps.queue.outputs.needs_build == 'true'
        run: |
          NN="${{ steps.queue.outputs.issue }}"
          python tools/build_issue.py --content "content/$NN.json"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "issues/$NN" index.html
          git commit -m "publish: CIRCUIT FERMÉ N°$NN (créneau programmé) [skip notify]"
          git pull --rebase origin master
          git push origin master

      - name: Envoyer la notification
        if: steps.queue.outputs.issue != ''
        env:
          RENDER_URL:  ${{ secrets.RENDER_URL }}
          PUSH_SECRET: ${{ secrets.PUSH_SECRET }}
        run: |
          NN="${{ steps.queue.outputs.issue }}"
          # Le corps de la notification porte la tagline du numéro : c'est le
          # premier point de contact, il doit vendre la thèse, pas du générique.
          BODY=$(python3 -c "import json;print(json.load(open('content/$NN.json'))['tagline_plain'])")
          python tools/send_push.py \
            --issue "$NN" \
            --title "CIRCUIT FERMÉ · N°$NN" \
            --body "$BODY"

      # Marqué APRÈS envoi réussi : un envoi raté sera retenté au créneau suivant.
      - name: Avancer le marqueur
        if: steps.queue.outputs.issue != ''
        run: |
          NN="${{ steps.queue.outputs.issue }}"
          mkdir -p state
          echo "$NN" > state/last-notified-issue.txt
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/last-notified-issue.txt
          git commit -m "chore(notify): N°$NN notifiée (créneau programmé) [skip notify]"
          git pull --rebase origin master
          git push origin master
